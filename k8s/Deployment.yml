apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-war-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-war-app
  template:
    metadata:
      labels:
        app: java-war-app
    spec:
      containers:
      - name: java-war-app
        image: ranigali/java-war-app:v18
        ports:
        - containerPort: 8080
      imagePullSecrets:
      - name: regcred
